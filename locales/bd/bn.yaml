##############################################################################
# UNMAPPED UI Strings — Bangladesh / Bengali (Bangla)
#
# Dignity test: every string must pass the Amara test.
# Forbidden: দুর্বল, সুবিধাভোগী, অদক্ষ (vulnerable, beneficiary, low-skilled)
##############################################################################

app:
  name: "UNMAPPED"
  tagline: "আপনি কোথায় আছেন তা জানুন। কী পৌঁছানো সম্ভব তা জানুন।"

interview:
  greeting: >
    হ্যালো! আমি আপনার কাজ ও দক্ষতা সম্পর্কে কিছু প্রশ্ন করব।
    কোনো ভুল উত্তর নেই — শুধু আপনার সত্যিকারের অভিজ্ঞতার কথা বলুন। প্রস্তুত?
  voice_prompt: "মাইক ট্যাপ করুন এবং যেকোনো ভাষায় কথা বলুন।"
  skill_probe: "এটি কীভাবে করেন তা ধাপে ধাপে বলুন।"
  evidence_prompt: "এমন কোনো সময়ের কথা বলুন যখন আপনি এটি কারো জন্য করেছিলেন।"

passport:
  title: "আপনার দক্ষতার পাসপোর্ট"
  subtitle: "আপনি কী জানেন এবং কী করতে পারেন তার একটি রেকর্ড।"
  receipt_label: "যাচাইকৃত দক্ষতা"
  share_prompt: "আপনার পাসপোর্ট শেয়ার করুন"
  qr_hint: "যেকোনো ফোন দিয়ে এটি স্ক্যান করে আপনার দক্ষতা দেখা যাবে।"

readiness:
  headline: "আপনার প্রস্তুতির চিত্র"
  automation_context: >
    বৈশ্বিক তথ্য বলছে আপনার মতো %s%% কাজ স্বয়ংক্রিয় হতে পারে।
    %s-এ সেই সংখ্যা প্রায় %s%%। পার্থক্যটি কেন গুরুত্বপূর্ণ তা এখানে রয়েছে।
  weather_sunny: "আপনার দক্ষতার চাহিদা বেশি এবং বাড়ছে।"
  weather_cloudy: "আগামী কয়েক বছরে আপনার কিছু কাজে পরিবর্তন আসতে পারে।"
  weather_rainy: >
    ২০৩০ সালের মধ্যে আপনার বর্তমান কাজের কিছু অংশ উল্লেখযোগ্যভাবে পরিবর্তিত হতে পারে।
    এগিয়ে থাকতে তিনটি জিনিস যোগ করতে পারেন।
  data_gap_notice: "⚠ এই অনুমান %s ব্যবহার করে"

matching:
  result_header: "আপনার দক্ষতার সাথে মিলে যাওয়া সুযোগগুলি"
  distance_label: "সেখানে পৌঁছাতে:"
  training_months: "%d মাসের প্রশিক্ষণ"
  income_multiple: "আপনার বর্তমান আয়ের %.1f গুণ"
  openings_nearby: "%d কিমির মধ্যে %d সুযোগ"
  wrong_job_label: "আপনার জন্য উপযুক্ত নয় — কারণটি জানুন"
  wage_floor_label: "সাধারণ মজুরি (ILOSTAT %d)"
  sector_growth_label: "সেক্টর বৃদ্ধি (%s)"
  source_tooltip: "সূত্র: %s"

errors:
  no_data: "আমাদের কাছে এখনও সেই তথ্য নেই। আমরা কী ব্যবহার করছি তা জানাব।"
  network: "সংযোগ সমস্যা — আপনার কাজ সংরক্ষিত আছে। অনলাইনে ফিরলে আবার চেষ্টা করুন।"
  generic: "কিছু একটা সমস্যা হয়েছে। আপনার প্রোফাইল নিরাপদ।"

data_gap_banner: "আমরা আপনার সাথে সৎ থাকছি: %s"
